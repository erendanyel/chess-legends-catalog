<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <title> Chess Legends Catalog</title>
    <meta name="description" content="A Catalog of Chess Legends" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/favicon.ico">
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">♟️ Chess Legends ♟️</h1>
    </header>
    <div id="search-filter-container">
        <div id="filter-row-1">
          <p>Search:</p> 
          <span id="search-box">
            <input id="search" type="text" placeholder="Enter name..." onkeyup="showCards()"></input>
            <p>🔍</p>
          </span>
        </div>
        <div id="filter-row-2">
          <span id="filter-box">
            <p>Sort by name:</p>
            <select id="name-filter" onchange="showCards()">
              <option value="All">Default</option>
              <option value="AZ">A-Z</option>
              <option value="ZA">Z-A</option>
            </select>
          </span>
          <span id="filter-box">
            <p>Country:</p>
            <select id="country-selector" onchange="showCards()">
              <option value="All">All</option>
            </select>
          </span>
          <span id="filter-box">
            <p>Play Style:</p>
            <select id="style-selector" onchange="showCards()">
              <option value="All">All</option>
            </select>
          </span>
          <span id="filter-box">
            <p>Max Elo:</p>
            <input type="range" id="max-elo" min="0" max="100" oninput="updateEloReadout();showCards()">
            <span id="elo-display">—</span>
          </span>
        </div>
    </div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-inner">
        <div class="card-front">
          <h2 class="player-name">Player's Name</h2>
          <div class="card-pills">
            <span class="pill pill-country player-country">Country </span>
            <span class="pill pill-elo player-elo">ELO </span>
            <span class="pill pill-style player-fact">-</span>
          </div>
        </div>
        <div class="card-back">
          <h2 class="game-title">Memorable Game</h2>
          <p class="game-details">Details</p>
          <p class="game-playing-as">Playing as:</p>
          <img alt="Game preview">
        </div>
      </div>
    </div>
    <div class="footer">
      <button onclick="flipCards()">Flip all cards!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
